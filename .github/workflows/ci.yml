name: Kingdom Builder CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compile and Test
      run: |
        cd kingdom
        mvn clean test

    - name: Dry-Run Boot Test (Sanity Check)
      run: |
        cd kingdom
        mvn exec:java -Dexec.mainClass="kingdom.Main"
